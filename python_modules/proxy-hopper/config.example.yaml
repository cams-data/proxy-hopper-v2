# Proxy Hopper — example configuration
#
# Server settings (host, port, log level, metrics) can be set here under
# the optional `server:` block, via PROXY_HOPPER_* environment variables,
# or as CLI flags.  CLI flags take the highest priority.
#
# Environment variables (all optional, shown with defaults):
#   PROXY_HOPPER_HOST=0.0.0.0
#   PROXY_HOPPER_PORT=8080
#   PROXY_HOPPER_LOG_LEVEL=INFO
#   PROXY_HOPPER_METRICS=false
#   PROXY_HOPPER_METRICS_PORT=9090
#   PROXY_HOPPER_ADMIN=false
#   PROXY_HOPPER_ADMIN_PORT=8081

# =============================================================================
# AUTHENTICATION  (optional — disabled by default)
# =============================================================================
# When auth.enabled is false, the proxy and admin API accept all requests.
# When enabled, every proxy request must carry:
#   X-Proxy-Hopper-Auth: Bearer <token>
# and every admin API request must carry:
#   Authorization: Bearer <token>
#
# Tokens can be: a static API key, a locally-issued JWT (from POST /auth/login),
# or an OIDC access token from a configured SSO provider.
#
# Hash a password for auth.admin.passwordHash:
#   proxy-hopper hash-password mysecret
#
# auth:
#   enabled: false
#
#   # ── Local admin user (human login via admin API) ─────────────────────────
#   # POST /auth/login with username + password to receive a JWT.
#   admin:
#     username: admin
#     passwordHash: "$2b$12$..."     # proxy-hopper hash-password <password>
#     role: admin                    # default: admin
#
#   # ── API keys (machine-to-machine proxy access only) ──────────────────────
#   # Clients send: X-Proxy-Hopper-Auth: Bearer <key>
#   # API keys cannot access the admin API — they are for proxy use only.
#   # targets: ["*"] allows all targets (default); list named targets to restrict.
#   apiKeys:
#     - name: ci-pipeline
#       key: "ph_abc123_changeme"
#       targets: ["*"]
#     - name: analytics-service
#       key: "ph_xyz789_changeme"
#       targets: [google-maps]        # restrict to specific targets
#
#   # ── OIDC / SSO (Authentik, Keycloak, Auth0, …) ──────────────────────────
#   # Validates tokens signed by the provider's JWKS endpoint.
#   # Works for both browser SSO tokens and service account tokens.
#   oidc:
#     issuer: "https://authentik.example.com/application/o/proxy-hopper/"
#     audience: "proxy-hopper"        # optional but recommended
#     rolesClaim: proxy_hopper_role   # JWT claim containing the role name
#
#   # ── JWT signing secret ───────────────────────────────────────────────────
#   # Used to sign locally-issued JWTs (POST /auth/login).
#   # If empty, a random secret is generated on startup (sessions don't survive
#   # restart).  Set a fixed secret for persistent sessions.
#   jwtSecret: ""
#   jwtExpiryMinutes: 60
#
#   # ── Custom roles (optional, JWT/OIDC users only) ─────────────────────────
#   # Built-in roles: admin (read+write+admin), operator (read+write), viewer (read).
#   # Custom roles restrict which targets a JWT/OIDC user can access.
#   # API keys use per-key targets instead of roles.
#   roles:
#     scraper:
#       permissions: [read, write]
#       targets: [google-maps]        # restrict to named targets; ["*"] = all
#     restricted-operator:
#       permissions: [read, write]
#       targets: [google-maps, example-api]

# =============================================================================
# TARGETS  (required)
# =============================================================================

targets:
  - name: google-maps
    # Regex matched against the full URL for HTTP, or "hostname:port" for HTTPS CONNECT.
    regex: '.*google\.com.*'
    ip_list:
      - "123.123.123.123"        # plain IP — uses default_proxy_port
      - "124.124.124.124:3128"   # explicit port
    min_request_interval: 2s     # minimum gap between reuses of the same IP
    max_queue_wait: 30s          # drop request if it waits longer than this
    num_retries: 5
    ip_failures_until_quarantine: 5
    quarantine_time: 120s
    default_proxy_port: 8080

  - name: example-api
    regex: '.*example\.com/api/.*'
    ip_list:
      - "200.200.200.200:8080"
    min_request_interval: 1s
    max_queue_wait: 15s
    num_retries: 3
    ip_failures_until_quarantine: 3
    quarantine_time: 60s
    default_proxy_port: 8080
