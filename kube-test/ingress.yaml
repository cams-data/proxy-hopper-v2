# Ingress — exposes the proxy port externally via nginx ingress controller.
#
# This setup assumes:
#   - nginx ingress controller installed (ingress-nginx)
#   - Cilium configured as the LoadBalancer provider for the nginx Service
#   - A DNS name or IP pointing to the nginx LoadBalancer
#
# For TCP proxying (HTTP CONNECT / raw proxy traffic) nginx ingress works at
# L7 for HTTP, but CONNECT tunnels and forwarding mode traffic are plain HTTP
# so L7 ingress is sufficient here.
#
# Replace proxy-hopper.test.internal with your actual hostname.
#
# If you want the proxy port reachable without a Host header (e.g. from curl
# with --proxy http://<lb-ip>:8080), use a Cilium LB Service directly instead
# of an Ingress — see the LoadBalancer service below.

---
# Option A: nginx Ingress (L7, hostname-based routing)
# Suitable for forwarding mode clients that set X-Proxy-Hopper-Target.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proxy-hopper
  namespace: proxy-hopper-test
  labels:
    app.kubernetes.io/name: proxy-hopper
    app.kubernetes.io/component: proxy
    environment: test
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Disable nginx buffering — proxy-hopper handles streaming itself
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # Preserve the real client IP
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: proxy-hopper.test.internal    # replace with your hostname or LB IP
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: proxy-hopper
                port:
                  name: proxy

---
# Option B: Cilium LoadBalancer Service (L4, IP-based)
# Better for HTTP proxy mode and CONNECT tunnels — no hostname required.
# Clients configure: http://<EXTERNAL-IP>:8080
# Remove this if you only need the nginx Ingress above.
apiVersion: v1
kind: Service
metadata:
  name: proxy-hopper-lb
  namespace: proxy-hopper-test
  labels:
    app.kubernetes.io/name: proxy-hopper
    app.kubernetes.io/component: proxy-external
    environment: test
  annotations:
    # Request a specific IP from the Cilium LB pool (optional):
    # "io.cilium/lb-ipam-ips": "192.168.1.100"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: proxy-hopper
  ports:
    - name: proxy
      port: 8080
      targetPort: proxy
      protocol: TCP
