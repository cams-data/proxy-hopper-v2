# ServiceMonitor — tells kube-prometheus-stack's Prometheus to scrape proxy-hopper.
#
# Requires the Prometheus Operator CRD (installed with kube-prometheus-stack).
# Verify it is available:
#   kubectl get crd servicemonitors.monitoring.coreos.com
#
# The Prometheus Operator must be configured to watch this namespace.
# With kube-prometheus-stack the default serviceMonitorNamespaceSelector is
# empty (matches all namespaces), so this should work out of the box.
# If your stack uses a restrictive selector, add the namespace label it expects.

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: proxy-hopper
  namespace: proxy-hopper-test
  labels:
    app.kubernetes.io/name: proxy-hopper
    app.kubernetes.io/component: proxy
    environment: test
    # This label must match the Prometheus Operator's serviceMonitorSelector.
    # With kube-prometheus-stack defaults (release=<helm-release-name>):
    #   release: kube-prometheus-stack
    # Check your stack's selector with:
    #   kubectl get prometheus -A -o jsonpath='{.items[*].spec.serviceMonitorSelector}'
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: proxy-hopper
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s         # scrape every 15s — fine-grained enough for alert latency
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - proxy-hopper-test
