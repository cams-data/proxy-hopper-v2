---
# ClusterIP — in-cluster clients reach proxy-hopper at:
#   http://proxy-hopper.proxy-hopper-test.svc.cluster.local:8080
apiVersion: v1
kind: Service
metadata:
  name: proxy-hopper
  namespace: proxy-hopper-test
  labels:
    app.kubernetes.io/name: proxy-hopper
    app.kubernetes.io/component: proxy
    environment: test
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: proxy-hopper
  ports:
    - name: proxy
      port: 8080
      targetPort: proxy
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
