apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-hopper
  namespace: proxy-hopper-test
  labels:
    app.kubernetes.io/name: proxy-hopper
    app.kubernetes.io/component: proxy
    environment: test
spec:
  # Single replica — memory backend stores IP pool state in-process.
  # Multiple replicas with memory backend would give each pod an independent
  # pool, breaking rotation fairness. Use the Redis backend for multi-replica.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: proxy-hopper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proxy-hopper
        app.kubernetes.io/component: proxy
        environment: test
    spec:
      containers:
        - name: proxy-hopper
          # Build with: docker build -f kube-test/Dockerfile -t proxy-hopper:kube-test .
          # Then push to your local registry and update this image reference.
          image: proxy-hopper:kube-test
          imagePullPolicy: Never       # use local image — change to Always for a real registry
          ports:
            - name: proxy
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: PROXY_HOPPER_HOST
              value: "0.0.0.0"
            - name: PROXY_HOPPER_PORT
              value: "8080"
            - name: PROXY_HOPPER_BACKEND
              value: "memory"
            - name: PROXY_HOPPER_CONFIG
              value: /etc/proxy-hopper/config.yaml
            - name: PROXY_HOPPER_LOG_LEVEL
              value: "DEBUG"
            - name: PROXY_HOPPER_LOG_FORMAT
              value: "text"
            - name: PROXY_HOPPER_METRICS
              value: "true"
            - name: PROXY_HOPPER_METRICS_PORT
              value: "9090"
            - name: PROXY_HOPPER_PROBE
              value: "true"
            - name: PROXY_HOPPER_PROBE_INTERVAL
              value: "60"
          volumeMounts:
            - name: config
              mountPath: /etc/proxy-hopper
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          livenessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2

      volumes:
        - name: config
          configMap:
            name: proxy-hopper-config
