apiVersion: v1
kind: ConfigMap
metadata:
  name: proxy-hopper-config
  namespace: proxy-hopper
  labels:
    app.kubernetes.io/name: proxy-hopper
    app.kubernetes.io/component: config
data:
  config.yaml: |
    # Replace the IP addresses below with your real external proxy addresses.
    # Targets are evaluated in order — the first match wins.
    targets:
      - name: general
        regex: '.*'
        ipList:
          - "203.0.113.10:3128"
          - "203.0.113.11:3128"
          - "203.0.113.12:3128"
          - "203.0.113.13:3128"
        minRequestInterval: 1s
        maxQueueWait: 30s
        numRetries: 3
        ipFailuresUntilQuarantine: 5
        quarantineTime: 2m
