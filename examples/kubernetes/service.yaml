# ClusterIP — for in-cluster clients
# Use this URL from other pods:
#   http://proxy-hopper.proxy-hopper.svc.cluster.local:8080

apiVersion: v1
kind: Service
metadata:
  name: proxy-hopper
  namespace: proxy-hopper
  labels:
    app.kubernetes.io/name: proxy-hopper
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: proxy-hopper
  ports:
    - name: proxy
      port: 8080
      targetPort: proxy
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
    # Uncomment when PROXY_HOPPER_ADMIN=true in deployment.yaml.
    # The admin API (REST + GraphQL) listens on port 8081.
    # Keep this port internal — use a restricted NetworkPolicy or separate Service
    # to control access rather than exposing it via the LoadBalancer.
    # - name: admin
    #   port: 8081
    #   targetPort: admin
    #   protocol: TCP

---
# LoadBalancer — for external access outside the cluster.
# Remove this Service if you only need in-cluster access, or if you are
# using an Ingress / Gateway API instead.

apiVersion: v1
kind: Service
metadata:
  name: proxy-hopper-lb
  namespace: proxy-hopper
  labels:
    app.kubernetes.io/name: proxy-hopper
    app.kubernetes.io/component: proxy-external
  annotations:
    # Cloud-provider-specific annotations — examples shown below.
    # AWS NLB (TCP passthrough, preserves client IP):
    #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # GCP internal load balancer:
    #   cloud.google.com/load-balancer-type: "Internal"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: proxy-hopper
  ports:
    - name: proxy
      port: 8080
      targetPort: proxy
      protocol: TCP
