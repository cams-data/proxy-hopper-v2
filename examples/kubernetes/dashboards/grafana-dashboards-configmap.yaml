---
# Grafana dashboard ConfigMap for the grafana-sc-dashboard sidecar.
#
# This file is a kustomize generator stub — see kustomization.yaml in this
# directory for the recommended way to apply it.
#
# If you prefer a plain kubectl apply, run the helper script instead:
#   ./apply-dashboards.sh [namespace]
#
# Prerequisites (kube-prometheus-stack or standalone Grafana with sidecar):
#   The Grafana sidecar must be configured to watch for ConfigMaps with the
#   label grafana_dashboard=1.  With the kube-prometheus-stack Helm chart:
#
#     grafana:
#       sidecar:
#         dashboards:
#           enabled: true
#           label: grafana_dashboard
#           labelValue: "1"
#           searchNamespace: proxy-hopper   # if Grafana is in a different namespace

apiVersion: v1
kind: ConfigMap
metadata:
  name: proxy-hopper-grafana-dashboards
  namespace: proxy-hopper
  labels:
    grafana_dashboard: "1"
# Data is populated by kustomization.yaml configMapGenerator or apply-dashboards.sh
