apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: proxy-hopper

configMapGenerator:
  - name: proxy-hopper-grafana-dashboards
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
    files:
      - proxy-hopper-admin.json
      - proxy-hopper-user.json
