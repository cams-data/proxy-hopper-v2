# Redis connection URL stored as a Secret so it is not visible in pod specs
# or deployment logs.
#
# The value below is the base64 encoding of:
#   redis://redis.proxy-hopper.svc.cluster.local:6379/0
#
# To encode your own URL:
#   echo -n "redis://your-redis-host:6379/0" | base64
#
# For production, use an external secret manager (AWS Secrets Manager,
# GCP Secret Manager, HashiCorp Vault) via the Secrets Store CSI driver
# rather than committing base64-encoded values to version control.

apiVersion: v1
kind: Secret
metadata:
  name: proxy-hopper-redis
  namespace: proxy-hopper
  labels:
    app.kubernetes.io/name: proxy-hopper
    app.kubernetes.io/component: redis-credentials
type: Opaque
data:
  # redis://redis.proxy-hopper.svc.cluster.local:6379/0
  redis-url: cmVkaXM6Ly9yZWRpcy5wcm94eS1ob3BwZXIuc3ZjLmNsdXN0ZXIubG9jYWw6NjM3OS8w
