# Example targets configuration for the Redis backend example.
#
# Pool state is stored in Redis — IPs survive restarts and are shared
# across all proxy-hopper replicas.  Replace the IP addresses below with
# your real external proxy addresses.
#
# Targets are evaluated in order — the first match wins.

targets:
  - name: general
    regex: '.*'
    ipList:
      - "203.0.113.10:3128"   # replace with real proxy IPs
      - "203.0.113.11:3128"
      - "203.0.113.12:3128"
      - "203.0.113.13:3128"
    minRequestInterval: 1s
    maxQueueWait: 30s
    numRetries: 3
    ipFailuresUntilQuarantine: 5
    quarantineTime: 2m
