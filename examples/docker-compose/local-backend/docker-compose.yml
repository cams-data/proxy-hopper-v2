services:
  proxy-hopper:
    build:
      context: ../../..       # repo root — gives Docker access to python_modules/
      dockerfile: examples/docker-compose/local-backend/Dockerfile
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-8080}:8080"     # proxy — point your HTTP clients here
      - "${METRICS_PORT:-9090}:9090"   # Prometheus /metrics  (only if metrics enabled)
    volumes:
      - ./config.yaml:/etc/proxy-hopper/config.yaml:ro
    environment:
      PROXY_HOPPER_HOST: "0.0.0.0"
      PROXY_HOPPER_PORT: "8080"
      PROXY_HOPPER_BACKEND: "memory"
      PROXY_HOPPER_LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      PROXY_HOPPER_LOG_FORMAT: "${LOG_FORMAT:-text}"
      # Uncomment to enable Prometheus metrics:
      # PROXY_HOPPER_METRICS: "true"
      # PROXY_HOPPER_METRICS_PORT: "9090"
    healthcheck:
      # Proxy TCP port should be accepting connections
      test: ["CMD", "python", "-c",
             "import socket; s=socket.create_connection(('localhost',8080),2); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
