# =============================================================================
# Proxy Hopper — in-memory backend example config
# =============================================================================
#
# Replace the placeholder IP addresses with your real proxy IPs, then start
# with: docker compose up --build
#
# Config priority (highest → lowest):
#   1. CLI flags (--port, --log-level, etc.)
#   2. This file  (server: block + targets)
#   3. PROXY_HOPPER_* environment variables
#
# =============================================================================
# PROXY PROVIDERS  (optional)
# =============================================================================
# Named proxy suppliers — each with their own credentials and a region tag for
# observability.  Reference them from ipPools via ipRequests.
#
# proxyProviders:
#   - name: my-provider
#     # auth is optional — omit for open or IP-whitelisted proxies
#     auth:
#       type: basic
#       username: myuser
#       password: mypassword
#     ipList:
#       - "proxy-1.example.com:3128"
#       - "proxy-2.example.com:3128"
#     regionTag: Australia

# =============================================================================
# IP POOLS  (optional)
# =============================================================================
# Define a named IP list once and reference it from multiple targets.
# Draw IPs from providers via ipRequests, or list them inline.
#
# ipPools:
#   - name: shared-pool
#     ipRequests:
#       - provider: my-provider
#         count: 3      # randomly sample 3 IPs from the provider's list

# =============================================================================
# AUTHENTICATION  (optional — disabled by default)
# =============================================================================
# When auth.enabled is false, the proxy accepts all requests without a token.
# Enable auth to require clients to present a Bearer token on every request.
#
# Hash a password:  proxy-hopper hash-password mysecret
#
# auth:
#   enabled: false
#   admin:
#     username: admin
#     passwordHash: "$2b$12$..."       # proxy-hopper hash-password <password>
#   # API keys are for proxy access only — not the admin API.
#   # targets: ["*"] allows all targets; list named targets to restrict.
#   apiKeys:
#     - name: my-service
#       key: "ph_abc123_changeme"
#       targets: ["*"]
#   jwtSecret: "change-me-to-a-long-random-string"
#   jwtExpiryMinutes: 60
#
# Uncomment in server: block below to expose the admin API:
#   admin: true
#   adminPort: 8081

# =============================================================================
# TARGETS  (required)
# =============================================================================
# Targets are evaluated top-to-bottom — the first regex match handles the
# request.  At least one target is required.

targets:

  # ---------------------------------------------------------------------------
  # Example: a more strictly rate-limited target for a specific API
  # ---------------------------------------------------------------------------
  # - name: strict-api
  #   regex: 'api\.example\.com'
  #   ipPool: shared-pool           # reference a named pool (credentials from provider)
  #   minRequestInterval: 10s       # only one request per IP per 10 seconds
  #   maxQueueWait: 60s
  #   numRetries: 1
  #   ipFailuresUntilQuarantine: 2
  #   quarantineTime: 30m
  #   defaultProxyPort: 3128

  # ---------------------------------------------------------------------------
  # General catch-all target
  # ---------------------------------------------------------------------------
  - name: general
    regex: '.*'
    ipList:
      - "203.0.113.10:3128"         # replace with your real proxy IPs
      - "203.0.113.11:3128"
      - "203.0.113.12:3128"

    # --- Rate limiting -------------------------------------------------------
    # minRequestInterval: how long an IP is held off the pool after any request
    # before it can be reused.  This is the primary knob for respecting per-IP
    # API rate limits.  The IP is unavailable to ALL requests during this window.
    # Duration format: plain number = seconds, or suffix s / m / h.
    minRequestInterval: 1s

    # How long a request will wait in the queue for a free IP before failing.
    maxQueueWait: 30s

    # --- Retries -------------------------------------------------------------
    # How many times to retry the request using a different IP before giving up.
    numRetries: 3

    # --- Quarantine ----------------------------------------------------------
    # An IP is quarantined after this many consecutive failures.
    ipFailuresUntilQuarantine: 5

    # How long the IP sits out before being returned to the pool.
    quarantineTime: 2m

    # Port used for IPs listed without an explicit port number.
    defaultProxyPort: 3128

    # --- Identity (optional) -------------------------------------------------
    # Attach a persistent browser fingerprint and cookie jar to each IP so
    # consecutive requests through the same IP look like the same client.
    # The identity rotates automatically on quarantine, on 429, or after N
    # requests.  Disabled by default — uncomment to enable.
    #
    # identity:
    #   enabled: true
    #   cookies: true               # persist and replay session cookies per IP
    #   # profile: chrome-windows   # fixed profile; omit for random per identity
    #   #                           # options: chrome-windows, chrome-macos,
    #   #                           #          safari-macos, firefox-linux, firefox-windows
    #   rotateAfterRequests: 100    # voluntarily rotate after N successful requests
    #   rotateOn429: true           # rotate immediately on a 429 response
    #   warmup:
    #     enabled: true             # send a GET before the identity enters service
    #     path: /                   # path for the warmup request

# =============================================================================
# SERVER SETTINGS  (optional — all have defaults)
# =============================================================================
# Settings here are overridden by PROXY_HOPPER_* env vars set in
# docker-compose.yml, and those are overridden again by CLI flags.
#
# Uncomment and edit any values you want to bake into this config file.
# In the Docker Compose example most of these are set via environment: instead.

# server:
#   host: 0.0.0.0              # PROXY_HOPPER_HOST
#   port: 8080                 # PROXY_HOPPER_PORT
#
#   # Logging
#   logLevel: INFO             # PROXY_HOPPER_LOG_LEVEL  — TRACE/DEBUG/INFO/WARNING/ERROR
#   logFormat: text            # PROXY_HOPPER_LOG_FORMAT — text or json
#   logFile: null              # PROXY_HOPPER_LOG_FILE   — path, or omit for stderr
#
#   # Backend
#   backend: memory            # PROXY_HOPPER_BACKEND    — memory (default) or redis
#   redisUrl: redis://localhost:6379/0  # PROXY_HOPPER_REDIS_URL (redis backend only)
#
#   # Prometheus metrics
#   metrics: false             # PROXY_HOPPER_METRICS
#   metricsPort: 9090          # PROXY_HOPPER_METRICS_PORT
#
#   # Background IP health prober (writes to Prometheus metrics, no pool side-effects)
#   probe: true                # PROXY_HOPPER_PROBE           — on by default
#   probeInterval: 60          # PROXY_HOPPER_PROBE_INTERVAL  — seconds between probe rounds
#   probeTimeout: 10           # PROXY_HOPPER_PROBE_TIMEOUT   — per-probe HTTP timeout
#   probeUrls:                 # PROXY_HOPPER_PROBE_URLS      — comma-separated as env var
#     - http://1.1.1.1
#     - http://www.google.com
#
#   # Prometheus metrics
#   metrics: false             # PROXY_HOPPER_METRICS
#   metricsPort: 9090          # PROXY_HOPPER_METRICS_PORT
#
#   # Admin API (management + login endpoint, foundation for GraphQL/UI)
#   admin: false               # PROXY_HOPPER_ADMIN
#   adminPort: 8081            # PROXY_HOPPER_ADMIN_PORT
