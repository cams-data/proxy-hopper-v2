# Default values for proxy-hopper.

replicaCount: 1

# Disable Kubernetes service-link env var injection. Keeping this false prevents
# PROXY_HOPPER_PORT (injected by kube for the proxy-hopper Service) from colliding
# with the ServerConfig.port field read by pydantic-settings.
enableServiceLinks: false

image:
  repository: ghcr.io/cams-data/proxy-hopper
  pullPolicy: IfNotPresent
  # Overrides the image tag. Defaults to the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: proxy-hopper.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: proxy-hopper-tls
  #    hosts:
  #      - proxy-hopper.example.com

resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   cpu: 500m
  #   memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# ── Config ─────────────────────────────────────────────────────────────────
# One of three approaches:
#
# 1. Inline config (default) — define config.yaml content directly in values.
# 2. Existing ConfigMap — reference a ConfigMap you manage separately.
# 3. Existing Secret — reference a Secret (for configs containing credentials).
#
config:
  # Inline config block. Ignored if existingConfigMap or existingSecret is set.
  inline: |
    targets:
      - name: general
        regex: '.*'
        ipList:
          - "10.0.0.1:3128"
          - "10.0.0.2:3128"
        minRequestInterval: 1s
        maxQueueWait: 30s
        numRetries: 3
        ipFailuresUntilQuarantine: 5
        quarantineTime: 2m

  # Reference an existing ConfigMap. Key must be "config.yaml".
  # existingConfigMap: ""

  # Reference an existing Secret. Key must be "config.yaml".
  # existingSecret: ""

# ── Backend ─────────────────────────────────────────────────────────────────
backend:
  # memory or redis
  type: memory

  redis:
    # URL for an external Redis instance. Used when backend.type=redis
    # and the bundled redis subchart is disabled.
    url: ""

# ── Prometheus ───────────────────────────────────────────────────────────────
metrics:
  enabled: false
  # Creates a Prometheus ServiceMonitor resource.
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}

# ── Redis subchart ───────────────────────────────────────────────────────────
# Uses the Bitnami Redis chart as an optional dependency.
# See https://github.com/bitnami/charts/tree/main/bitnami/redis for full values.
redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}
