# Default values for proxy-hopper.

replicaCount: 1

# Disable Kubernetes service-link env var injection. Keeping this false prevents
# PROXY_HOPPER_PORT (injected by kube for the proxy-hopper Service) from colliding
# with the ServerConfig.port field read by pydantic-settings.
enableServiceLinks: false

image:
  repository: ghcr.io/cams-data/proxy-hopper
  pullPolicy: IfNotPresent
  # Overrides the image tag. Defaults to the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: proxy-hopper.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: proxy-hopper-tls
  #    hosts:
  #      - proxy-hopper.example.com

resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   cpu: 500m
  #   memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# ── Config ─────────────────────────────────────────────────────────────────
# One of three approaches:
#
# 1. Inline config (default) — define config.yaml content directly in values.
# 2. Existing ConfigMap — reference a ConfigMap you manage separately.
# 3. Existing Secret — reference a Secret (for configs containing credentials).
#
# IMPORTANT: when auth is enabled (auth.enabled: true inside config.yaml),
# use approach 3 (existingSecret) so credentials are never stored in a plain
# ConfigMap.  Create the Secret with:
#
#   kubectl create secret generic proxy-hopper-config \
#     --from-file=config.yaml=./config-with-auth.yaml
#
config:
  # Inline config block. Ignored if existingConfigMap or existingSecret is set.
  inline: |
    # Authentication is disabled by default. To enable, add an auth: block here.
    # When using auth, switch to config.existingSecret (see values.yaml comment).
    #
    # auth:
    #   enabled: true
    #   admin:
    #     username: admin
    #     passwordHash: "$2b$12$..."   # proxy-hopper hash-password <password>
    #     role: admin
    #   # API keys are for proxy access only — not the admin API.
    #   # targets: ["*"] allows all targets; list named targets to restrict.
    #   apiKeys:
    #     - name: my-service
    #       key: "ph_changeme"
    #       targets: ["*"]
    #   jwtSecret: "change-me-to-a-long-random-string"
    #   jwtExpiryMinutes: 60
    #
    # Enable the admin API + GraphQL by setting admin.enabled=true in values.yaml.
    # The admin API listens on admin.port (default 8081) and exposes:
    #   POST /auth/login, GET /health, GET /api/v1/status, POST|GET /graphql

    targets:
      - name: general
        regex: '.*'
        ipList:
          - "10.0.0.1:3128"
          - "10.0.0.2:3128"
        minRequestInterval: 1s
        maxQueueWait: 30s
        numRetries: 3
        ipFailuresUntilQuarantine: 5
        quarantineTime: 2m

  # Reference an existing ConfigMap. Key must be "config.yaml".
  # existingConfigMap: ""

  # Reference an existing Secret. Key must be "config.yaml".
  # Recommended when auth is enabled — keeps credentials out of ConfigMaps.
  # existingSecret: ""

# ── Backend ─────────────────────────────────────────────────────────────────
backend:
  # memory or redis
  type: memory

  redis:
    # URL for an external Redis instance. Used when backend.type=redis
    # and the bundled redis subchart is disabled.
    url: ""

# ── Prometheus ───────────────────────────────────────────────────────────────
metrics:
  enabled: false
  # Must match ServerConfig.metrics_port (default 9090).
  port: 9090
  # Creates a Prometheus ServiceMonitor resource.
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}

# ── Admin API ────────────────────────────────────────────────────────────────
# The admin API exposes a management REST interface and GraphQL API on a
# separate port.  Endpoints:
#   POST /auth/login          — obtain a JWT (requires auth.admin in config.yaml)
#   GET  /health              — liveness check (public)
#   GET  /api/v1/status       — server state   (requires read permission)
#   POST|GET /graphql         — Strawberry GraphQL API
#                               (interactive playground at GET /graphql)
#
# Auth config (apiKeys, admin user, OIDC, jwtSecret) lives inside config.yaml,
# not here.  Enable the admin server here; configure *who* can access it there.
admin:
  enabled: false
  # Port the admin API listens on inside the container.
  # Must match server.adminPort in config.yaml (or PROXY_HOPPER_ADMIN_PORT).
  port: 8081
  # Expose the admin port via the proxy Service (adds a named port "admin").
  # Set to false if you want the admin API reachable only inside the cluster
  # via direct pod access or a separate, more restricted Service.
  service:
    enabled: true

# ── Redis subchart ───────────────────────────────────────────────────────────
# Uses the Bitnami Redis chart as an optional dependency.
# See https://github.com/bitnami/charts/tree/main/bitnami/redis for full values.
redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 1Gi

# ── Grafana dashboards ───────────────────────────────────────────────────────
# Creates a ConfigMap with .url keys that the Grafana sidecar picks up and
# fetches from GitHub. Requires the Grafana dashboard sidecar to be configured
# to watch this namespace.
grafana:
  dashboards:
    enabled: false
    # Label key/value the Grafana sidecar watches for. Common values:
    #   grafana_dashboard: "1"   (kube-prometheus-stack default)
    #   grafana_dashboard: "true"
    labelKey: grafana_dashboard
    labelValue: "1"
    # Additional labels to add to the ConfigMap (e.g. to scope to a folder).
    additionalLabels: {}
      # grafana_folder: proxy-hopper
    # Base URL for the dashboard JSON files.
    baseUrl: "https://raw.githubusercontent.com/cams-data/proxy-hopper-v2/next/monitoring/grafana/dashboards"

nodeSelector: {}
tolerations: []
affinity: {}
