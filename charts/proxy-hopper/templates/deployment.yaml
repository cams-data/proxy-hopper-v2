apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "proxy-hopper.fullname" . }}
  labels:
    {{- include "proxy-hopper.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "proxy-hopper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the inline config changes.
        {{- if and (not .Values.config.existingConfigMap) (not .Values.config.existingSecret) }}
        checksum/config: {{ .Values.config.inline | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "proxy-hopper.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "proxy-hopper.serviceAccountName" . }}
      enableServiceLinks: {{ .Values.enableServiceLinks }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "proxy-hopper.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/proxy-hopper/config.yaml
            {{- if .Values.metrics.enabled }}
            - --metrics
            - --metrics-port
            - {{ .Values.metrics.port | quote }}
            {{- end }}
            {{- if eq .Values.backend.type "redis" }}
            - --backend
            - redis
            - --redis-url
            - {{ include "proxy-hopper.redisUrl" . }}
            {{- end }}
          {{- if .Values.admin.enabled }}
          env:
            - name: PROXY_HOPPER_ADMIN
              value: "true"
            - name: PROXY_HOPPER_ADMIN_PORT
              value: {{ .Values.admin.port | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.admin.enabled }}
            - name: admin
              containerPort: {{ .Values.admin.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/proxy-hopper
              readOnly: true
      volumes:
        - name: config
          {{- if eq (include "proxy-hopper.configIsSecret" .) "true" }}
          secret:
            secretName: {{ include "proxy-hopper.configName" . }}
          {{- else }}
          configMap:
            name: {{ include "proxy-hopper.configName" . }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
