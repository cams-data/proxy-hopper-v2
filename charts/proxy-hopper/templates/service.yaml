apiVersion: v1
kind: Service
metadata:
  name: {{ include "proxy-hopper.fullname" . }}
  labels:
    {{- include "proxy-hopper.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.metrics.enabled }}
    - port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
    {{- if and .Values.admin.enabled .Values.admin.service.enabled }}
    - port: {{ .Values.admin.port }}
      targetPort: admin
      protocol: TCP
      name: admin
    {{- end }}
  selector:
    {{- include "proxy-hopper.selectorLabels" . | nindent 4 }}
