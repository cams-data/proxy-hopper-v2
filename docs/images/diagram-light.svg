<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 160" fill="none">
  <!-- Background -->
  <rect width="740" height="160" rx="12" fill="#F8FAFC"/>

  <!-- ── Your App box ── -->
  <rect x="20" y="50" width="120" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="80" y="76" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0F172A">Your App</text>
  <text x="80" y="93" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">HTTP client</text>

  <!-- Arrow: App → PH -->
  <line x1="141" y1="80" x2="189" y2="80" stroke="#0D9488" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="189,75 199,80 189,85" fill="#0D9488"/>
  <text x="170" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748B">proxy / CONNECT</text>
  <text x="170" y="97" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748B">or forwarding</text>

  <!-- ── Proxy Hopper box ── -->
  <rect x="200" y="30" width="150" height="100" rx="8" fill="#0D9488"/>
  <!-- Subtle inner highlight -->
  <rect x="200" y="30" width="150" height="100" rx="8" fill="url(#ph-grad)"/>
  <!-- Frog icon (simplified) -->
  <ellipse cx="275" cy="68" rx="14" ry="11" fill="white" opacity="0.15"/>
  <ellipse cx="275" cy="58" rx="11" ry="9" fill="white" opacity="0.15"/>
  <circle cx="267" cy="52" r="5" fill="white" opacity="0.2"/>
  <circle cx="283" cy="52" r="5" fill="white" opacity="0.2"/>
  <circle cx="267" cy="52" r="3" fill="white" opacity="0.5"/>
  <circle cx="283" cy="52" r="3" fill="white" opacity="0.5"/>
  <text x="275" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="white">Proxy Hopper</text>
  <text x="275" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" opacity="0.8">rotating · retrying</text>

  <!-- Gradient def -->
  <defs>
    <linearGradient id="ph-grad" x1="200" y1="30" x2="350" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Arrows: PH → IP pool (fan out) -->
  <line x1="351" y1="65" x2="399" y2="45" stroke="#0D9488" stroke-width="1.5"/>
  <line x1="351" y1="80" x2="399" y2="80" stroke="#0D9488" stroke-width="1.5"/>
  <line x1="351" y1="95" x2="399" y2="115" stroke="#0D9488" stroke-width="1.5"/>
  <polygon points="399,40 409,45 399,50" fill="#0D9488"/>
  <polygon points="399,75 409,80 399,85" fill="#0D9488"/>
  <polygon points="399,110 409,115 399,120" fill="#0D9488"/>

  <!-- ── IP Pool boxes ── -->
  <!-- IP 1 -->
  <rect x="410" y="28" width="110" height="34" rx="6" fill="white" stroke="#14B8A6" stroke-width="1.5"/>
  <circle cx="427" cy="45" r="7" fill="#CCFBF1"/>
  <text x="427" y="49" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0D9488" font-weight="700">IP</text>
  <text x="475" y="42" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#0F172A">10.0.0.1:3128</text>
  <text x="475" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748B">US-East · active</text>

  <!-- IP 2 (active / highlighted) -->
  <rect x="410" y="63" width="110" height="34" rx="6" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
  <circle cx="427" cy="80" r="7" fill="#99F6E4"/>
  <text x="427" y="84" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0D9488" font-weight="700">IP</text>
  <text x="475" y="77" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#0F172A">10.0.0.2:3128</text>
  <text x="475" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0D9488" font-weight="600">in use →</text>

  <!-- IP 3 (quarantined) -->
  <rect x="410" y="98" width="110" height="34" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="427" cy="115" r="7" fill="#FEF2F2"/>
  <text x="427" y="119" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#EF4444" font-weight="700">!</text>
  <text x="475" y="112" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#94A3B8">10.0.0.3:3128</text>
  <text x="475" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#EF4444">quarantined</text>

  <!-- Arrow: active IP → Target -->
  <line x1="521" y1="80" x2="569" y2="80" stroke="#0D9488" stroke-width="1.5"/>
  <polygon points="569,75 579,80 569,85" fill="#0D9488"/>

  <!-- ── Target site box ── -->
  <rect x="580" y="50" width="140" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="650" y="76" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0F172A">Target Site</text>
  <text x="650" y="93" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">api.example.com</text>
</svg>
