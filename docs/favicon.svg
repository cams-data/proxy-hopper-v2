<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Frog body -->
  <ellipse cx="32" cy="50" rx="18" ry="13" fill="#0D9488"/>
  <!-- Frog head -->
  <ellipse cx="32" cy="33" rx="15" ry="13" fill="#0D9488"/>
  <!-- Left eye dome -->
  <circle cx="18" cy="21" r="9" fill="#0F766E"/>
  <!-- Right eye dome -->
  <circle cx="46" cy="21" r="9" fill="#0F766E"/>
  <!-- Left eye white -->
  <circle cx="18" cy="21" r="5.5" fill="white"/>
  <!-- Right eye white -->
  <circle cx="46" cy="21" r="5.5" fill="white"/>
  <!-- Left pupil -->
  <circle cx="19.5" cy="21" r="2.8" fill="#134E4A"/>
  <!-- Right pupil -->
  <circle cx="47.5" cy="21" r="2.8" fill="#134E4A"/>
  <!-- Belly highlight -->
  <ellipse cx="32" cy="52" rx="11" ry="9" fill="#14B8A6" opacity="0.4"/>
  <!-- Smile -->
  <path d="M22 41 Q32 49 42 41" stroke="#0F766E" stroke-width="2.2" stroke-linecap="round" fill="none"/>
</svg>
