<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 40" fill="none">
  <!-- Frog body -->
  <ellipse cx="20" cy="27" rx="11" ry="9" fill="#14B8A6"/>
  <!-- Frog head -->
  <ellipse cx="20" cy="18" rx="9" ry="7" fill="#14B8A6"/>
  <!-- Left eye dome -->
  <circle cx="13" cy="13" r="4" fill="#0D9488"/>
  <!-- Right eye dome -->
  <circle cx="27" cy="13" r="4" fill="#0D9488"/>
  <!-- Left eye white -->
  <circle cx="13" cy="13" r="2.4" fill="white"/>
  <!-- Right eye white -->
  <circle cx="27" cy="13" r="2.4" fill="white"/>
  <!-- Left pupil -->
  <circle cx="13.6" cy="13" r="1.2" fill="#134E4A"/>
  <!-- Right pupil -->
  <circle cx="27.6" cy="13" r="1.2" fill="#134E4A"/>
  <!-- Belly highlight -->
  <ellipse cx="20" cy="28" rx="6.5" ry="5.5" fill="#2DD4BF" opacity="0.35"/>
  <!-- Smile -->
  <path d="M15 22 Q20 26 25 22" stroke="#0D9488" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Left front leg -->
  <path d="M11 30 Q7 33 5 36 Q7.5 37 9 34.5 Q10 37.5 12.5 36.5 Q12 33 13 31" fill="#14B8A6"/>
  <!-- Right front leg -->
  <path d="M29 30 Q33 33 35 36 Q32.5 37 31 34.5 Q30 37.5 27.5 36.5 Q28 33 27 31" fill="#14B8A6"/>

  <!-- Wordmark -->
  <text x="44" y="17" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="700" fill="white" letter-spacing="-0.4">Proxy</text>
  <text x="44" y="34" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="700" fill="#2DD4BF" letter-spacing="-0.4">Hopper</text>
</svg>
