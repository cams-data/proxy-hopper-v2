<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 44" fill="none">
  <!-- Frog body -->
  <ellipse cx="22" cy="28" rx="11" ry="9" fill="#14B8A6"/>
  <!-- Frog head -->
  <ellipse cx="22" cy="19" rx="9" ry="7" fill="#14B8A6"/>
  <!-- Left eye dome -->
  <circle cx="15" cy="14" r="4" fill="#0D9488"/>
  <!-- Right eye dome -->
  <circle cx="29" cy="14" r="4" fill="#0D9488"/>
  <!-- Left eye white -->
  <circle cx="15" cy="14" r="2.4" fill="white"/>
  <!-- Right eye white -->
  <circle cx="29" cy="14" r="2.4" fill="white"/>
  <!-- Left pupil -->
  <circle cx="15.6" cy="14" r="1.2" fill="#134E4A"/>
  <!-- Right pupil -->
  <circle cx="29.6" cy="14" r="1.2" fill="#134E4A"/>
  <!-- Belly highlight -->
  <ellipse cx="22" cy="29" rx="6.5" ry="5.5" fill="#2DD4BF" opacity="0.35"/>
  <!-- Smile -->
  <path d="M17 23 Q22 27 27 23" stroke="#0D9488" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Left front leg -->
  <path d="M13 31 Q9 34 7 37 Q9.5 38 11 35.5 Q12 38.5 14.5 37.5 Q14 34 15 32" fill="#14B8A6"/>
  <!-- Right front leg -->
  <path d="M31 31 Q35 34 37 37 Q34.5 38 33 35.5 Q32 38.5 29.5 37.5 Q30 34 29 32" fill="#14B8A6"/>

  <!-- Wordmark -->
  <text x="50" y="22" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="-0.4">Proxy</text>
  <text x="50" y="38" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#2DD4BF" letter-spacing="-0.4">Hopper</text>
</svg>
