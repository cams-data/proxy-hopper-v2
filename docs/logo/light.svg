<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" fill="none">
  <!-- Frog body -->
  <ellipse cx="30" cy="46" rx="17" ry="13" fill="#0D9488"/>
  <!-- Frog head -->
  <ellipse cx="30" cy="30" rx="14" ry="12" fill="#0D9488"/>
  <!-- Left eye dome -->
  <circle cx="18" cy="20" r="7" fill="#0F766E"/>
  <!-- Right eye dome -->
  <circle cx="42" cy="20" r="7" fill="#0F766E"/>
  <!-- Left eye white -->
  <circle cx="18" cy="20" r="4.2" fill="white"/>
  <!-- Right eye white -->
  <circle cx="42" cy="20" r="4.2" fill="white"/>
  <!-- Left pupil -->
  <circle cx="19" cy="20" r="2.1" fill="#134E4A"/>
  <!-- Right pupil -->
  <circle cx="43" cy="20" r="2.1" fill="#134E4A"/>
  <!-- Belly highlight -->
  <ellipse cx="30" cy="48" rx="10" ry="9" fill="#14B8A6" opacity="0.35"/>
  <!-- Smile -->
  <path d="M21 37 Q30 44 39 37" stroke="#0F766E" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Left front leg -->
  <path d="M15 50 Q9 55 6 59 Q10 60 12 56 Q13 60 17 59 Q16 54 18 51" fill="#0D9488"/>
  <!-- Right front leg -->
  <path d="M45 50 Q51 55 54 59 Q50 60 48 56 Q47 60 43 59 Q44 54 42 51" fill="#0D9488"/>

  <!-- Wordmark: "Proxy Hopper" on one line -->
  <text x="68" y="40" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="800" fill="#134E4A" letter-spacing="-0.5">Proxy <tspan fill="#0D9488">Hopper</tspan></text>
</svg>
