<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Frog body -->
  <ellipse cx="30" cy="42" rx="16" ry="13" fill="#0D9488"/>
  <!-- Frog head -->
  <ellipse cx="30" cy="28" rx="13" ry="11" fill="#0D9488"/>
  <!-- Left eye dome -->
  <circle cx="19" cy="20" r="6" fill="#0F766E"/>
  <!-- Right eye dome -->
  <circle cx="41" cy="20" r="6" fill="#0F766E"/>
  <!-- Left eye white -->
  <circle cx="19" cy="20" r="3.6" fill="white"/>
  <!-- Right eye white -->
  <circle cx="41" cy="20" r="3.6" fill="white"/>
  <!-- Left pupil -->
  <circle cx="20" cy="20" r="1.8" fill="#134E4A"/>
  <!-- Right pupil -->
  <circle cx="42" cy="20" r="1.8" fill="#134E4A"/>
  <!-- Belly highlight -->
  <ellipse cx="30" cy="44" rx="9" ry="8" fill="#14B8A6" opacity="0.35"/>
  <!-- Smile -->
  <path d="M22 35 Q30 41 38 35" stroke="#0F766E" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Left front leg -->
  <path d="M16 46 Q10 51 7 56 Q11 57 13 53 Q14 57 18 56 Q17 51 19 48" fill="#0D9488"/>
  <!-- Right front leg -->
  <path d="M44 46 Q50 51 53 56 Q49 57 47 53 Q46 57 42 56 Q43 51 41 48" fill="#0D9488"/>

  <!-- Wordmark -->
  <text x="68" y="28" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="800" fill="#134E4A" letter-spacing="-0.5">Proxy</text>
  <text x="68" y="52" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="800" fill="#0D9488" letter-spacing="-0.5">Hopper</text>
</svg>
