name: Next (pre-release)

on:
  push:
    branches:
      - next
  pull_request:
    branches:
      - next

jobs:
  # ---------------------------------------------------------------------------
  # Test suite — runs on every push to next and on every PR targeting next
  # (including the release-please PR, so it can be auto-merged cleanly).
  # ---------------------------------------------------------------------------
  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run proxy-hopper tests
        working-directory: python_modules/proxy-hopper
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras
          uv run pytest --tb=short -q

      - name: Run proxy-hopper-redis tests
        working-directory: python_modules/proxy-hopper-redis
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras
          uv run pytest --tb=short -q

      - name: Run contract tests (all backends)
        working-directory: python_modules/tests
        run: |
          uv sync --python ${{ matrix.python-version }}
          uv run pytest --tb=short -q

  # ---------------------------------------------------------------------------
  # release-please — runs only on push to next (not on PRs).
  # Creates/updates the Release PR. When the Release PR is merged, tags the
  # commit, creates the GitHub Release, and sets releases_created=true to
  # trigger the build job below.
  # Auto-merges the Release PR once CI passes via --auto flag.
  # ---------------------------------------------------------------------------
  release-please:
    name: Release Please (pre-release)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          target-branch: next

  # ---------------------------------------------------------------------------
  # Enable auto-merge on the Release PR so it merges automatically once CI
  # passes — no manual intervention needed.
  # ---------------------------------------------------------------------------
  automerge-release-pr:
    name: Auto-merge Release PR
    needs: release-please
    if: >
      github.event_name == 'push' &&
      needs.release-please.outputs.releases_created != 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Enable auto-merge on Release PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label "autorelease: pending" \
            --json number \
            --jq '.[0].number')
          if [ -n "$PR" ] && [ "$PR" != "null" ]; then
            gh pr merge "$PR" \
              --repo "${{ github.repository }}" \
              --auto \
              --merge
            echo "Auto-merge enabled for PR #$PR"
          else
            echo "No pending release PR found"
          fi

  # ---------------------------------------------------------------------------
  # Build wheels and publish to the GitHub Release.
  # Only runs when release-please has just created a new release tag.
  # ---------------------------------------------------------------------------
  build-and-release:
    name: Build & publish pre-release
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build wheels and sdists
        run: |
          uv build --wheel --sdist --out-dir dist \
            python_modules/proxy-hopper \
            python_modules/proxy-hopper-redis

      - name: Upload assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/* \
            --repo "${{ github.repository }}"
