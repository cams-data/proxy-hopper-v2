name: Next (pre-release)

on:
  push:
    branches:
      - next
  pull_request:
    branches:
      - next

jobs:
  # ---------------------------------------------------------------------------
  # Test suite — runs on every push to next and on every PR targeting next.
  # ---------------------------------------------------------------------------
  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run proxy-hopper tests
        working-directory: python_modules/proxy-hopper
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras
          uv run pytest --tb=short -q

      - name: Run proxy-hopper-redis tests
        working-directory: python_modules/proxy-hopper-redis
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras
          uv run pytest --tb=short -q

      - name: Run contract tests (all backends)
        working-directory: python_modules/tests
        run: |
          uv sync --python ${{ matrix.python-version }}
          uv run pytest --tb=short -q

  # ---------------------------------------------------------------------------
  # release-please — runs only on push to next (not on PRs).
  #
  # skip-github-pull-request: true means release-please commits version bumps
  # directly to next rather than opening a PR. This avoids needing branch
  # protection bypass, bot self-approval, or "Actions can approve PRs".
  #
  # The trade-off is intentional: next is a staging branch. Feature commits
  # are already reviewed before landing here. The version bump commit itself
  # (pyproject.toml, CHANGELOG, manifest) needs no human review.
  #
  # When the release-please commit lands on next, it immediately creates the
  # tag and GitHub Release (releases_created=true), which triggers the build.
  # ---------------------------------------------------------------------------
  release-please:
    name: Release Please (pre-release)
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          target-branch: next
          skip-github-pull-request: true

  # ---------------------------------------------------------------------------
  # Build wheels and publish to the GitHub Release.
  # Fires immediately after release-please creates the tag — no PR wait.
  # ---------------------------------------------------------------------------
  build-and-release:
    name: Build & publish pre-release
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build wheels and sdists
        run: |
          uv build --wheel --sdist --out-dir dist \
            python_modules/proxy-hopper \
            python_modules/proxy-hopper-redis

      - name: Upload assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/* \
            --repo "${{ github.repository }}"
