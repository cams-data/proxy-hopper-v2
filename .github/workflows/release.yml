name: Release

on:
  push:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Test suite — must pass before a tag is created.
  # ---------------------------------------------------------------------------
  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run proxy-hopper tests
        working-directory: python_modules/proxy-hopper
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras
          uv run pytest --tb=short -q

      - name: Run proxy-hopper-redis tests
        working-directory: python_modules/proxy-hopper-redis
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras
          uv run pytest --tb=short -q

      - name: Run contract tests (all backends)
        working-directory: python_modules/tests
        run: |
          uv sync --python ${{ matrix.python-version }}
          uv run pytest --tb=short -q

  # ---------------------------------------------------------------------------
  # Tag — reads conventional commits since the last tag and pushes a new one.
  # Stable tags on main have no suffix (e.g. v0.1.1).
  # If no bump-worthy commits exist the step is a no-op (new_tag is empty).
  # ---------------------------------------------------------------------------
  tag:
    name: Tag release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          pre_release_branches: next
          default_bump: patch
          tag_prefix: v

      - name: Strip tag prefix
        id: version
        if: steps.tag.outputs.new_tag != ''
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.tag.outputs.new_tag }}

  # ---------------------------------------------------------------------------
  # Build wheels + sdists, update CHANGELOG.md, publish GitHub release.
  # Uploads wheels as artifacts for the Docker job to consume.
  # ---------------------------------------------------------------------------
  build-and-release:
    name: Build & publish release
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        id: notes
        run: |
          # Notes for just this release (between previous tag and this one)
          git-cliff --config cliff.toml --latest --strip header > release-notes.md
          cat release-notes.md

      - name: Update CHANGELOG.md
        run: |
          git-cliff --config cliff.toml --output CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore(changelog): update for ${{ needs.tag.outputs.new_tag }} [skip ci]"
          git push origin HEAD:main

      - name: Build wheels and sdists
        run: |
          uv build --wheel --sdist --out-dir dist python_modules/proxy-hopper
          uv build --wheel --sdist --out-dir dist python_modules/proxy-hopper-redis

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.tag.outputs.new_tag }}" dist/* \
            --title "${{ needs.tag.outputs.new_tag }}" \
            --notes-file release-notes.md \
            --repo "${{ github.repository }}"

      - name: Upload wheels for Docker job
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Docker — multi-arch build (amd64 + arm64) pushed to ghcr.io.
  # After pushing, edits the GitHub release to add image links.
  #
  # Two images per release:
  #   proxy-hopper:<version>        memory backend only
  #   proxy-hopper:<version>-redis  includes Redis backend
  #
  # Both also tagged :latest and :latest-redis respectively.
  # ---------------------------------------------------------------------------
  docker:
    name: Build & push Docker images
    needs: [tag, build-and-release]
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: docker/wheels

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push — memory backend
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/proxy-hopper:${{ needs.tag.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/proxy-hopper:latest

      - name: Build and push — Redis backend
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile.redis
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/proxy-hopper:${{ needs.tag.outputs.version }}-redis
            ghcr.io/${{ github.repository_owner }}/proxy-hopper:latest-redis

      - name: Add image links to release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.tag.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          cat >> image-links.md << EOF

          ## Docker images

          | Image | Pull command |
          |---|---|
          | Memory backend | \`docker pull ghcr.io/${OWNER}/proxy-hopper:${VERSION}\` |
          | Redis backend | \`docker pull ghcr.io/${OWNER}/proxy-hopper:${VERSION}-redis\` |

          Built for \`linux/amd64\` and \`linux/arm64\`.
          EOF

          gh release edit "${{ needs.tag.outputs.new_tag }}" \
            --notes-file <(gh release view "${{ needs.tag.outputs.new_tag }}" --json body --jq '.body' && cat image-links.md) \
            --repo "${{ github.repository }}"

  # ---------------------------------------------------------------------------
  # Helm — package the chart and push to ghcr.io OCI registry.
  # ---------------------------------------------------------------------------
  helm:
    name: Publish Helm chart
    needs: [tag, docker]
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update chart version
        env:
          VERSION: ${{ needs.tag.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/proxy-hopper/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/proxy-hopper/Chart.yaml

      - name: Fetch chart dependencies
        run: helm dependency update charts/proxy-hopper

      - name: Package chart
        run: helm package charts/proxy-hopper --destination /tmp/helm-charts

      - name: Push chart to ghcr.io
        env:
          VERSION: ${{ needs.tag.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          helm push /tmp/helm-charts/proxy-hopper-${VERSION}.tgz oci://ghcr.io/${OWNER}/helm

      - name: Add Helm install instructions to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.tag.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          cat >> helm-links.md << EOF

          ## Helm chart

          \`\`\`bash
          helm install proxy-hopper oci://ghcr.io/${OWNER}/helm/proxy-hopper --version ${VERSION}
          \`\`\`
          EOF

          gh release edit "${{ needs.tag.outputs.new_tag }}" \
            --notes-file <(gh release view "${{ needs.tag.outputs.new_tag }}" --json body --jq '.body' && cat helm-links.md) \
            --repo "${{ github.repository }}"
