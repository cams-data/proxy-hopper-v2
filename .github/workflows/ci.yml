name: CI

on:
  push:
    branches-ignore:
      - main
      - next
  pull_request:
    branches:
      - main
      - next

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run proxy-hopper tests
        working-directory: python_modules/proxy-hopper
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras
          uv run pytest --tb=short -q

      - name: Run proxy-hopper-redis tests
        working-directory: python_modules/proxy-hopper-redis
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras
          uv run pytest --tb=short -q

      - name: Run contract tests (all backends)
        working-directory: python_modules/tests
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          uv sync --python ${{ matrix.python-version }}
          uv run pytest --tb=short -q

      - name: Run integration tests
        working-directory: python_modules/proxy-hopper-testserver
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras
          uv run pytest --tb=short -q
