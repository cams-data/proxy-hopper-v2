name: CI

on:
  push:
    branches-ignore:
      - main
      - next
  pull_request:
    branches:
      - main
      - next
      - next

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run proxy-hopper tests
        working-directory: python_modules/proxy-hopper
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras
          uv run pytest --tb=short -q

      - name: Run proxy-hopper-redis tests
        working-directory: python_modules/proxy-hopper-redis
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras
          uv run pytest --tb=short -q

      - name: Run contract tests (all backends)
        working-directory: python_modules/tests
        run: |
          uv sync --python ${{ matrix.python-version }}
          uv run pytest --tb=short -q
